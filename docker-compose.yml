version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supportsphere-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supportsphere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supportsphere-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supportsphere-backend
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=supportsphere
      - JWT_SECRET_KEY=super-secret-supportsphere-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/workspace/uploads
    networks:
      - supportsphere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supportsphere-frontend
    depends_on:
      - backend
    networks:
      - supportsphere-network

  nginx:
    image: nginx:alpine
    container_name: supportsphere-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - supportsphere-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: supportsphere-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - supportsphere-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: supportsphere-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - supportsphere-network

  loki:
    image: grafana/loki:2.8.2
    container_name: supportsphere-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - supportsphere-network

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: supportsphere-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: --config.file=/etc/alertmanager/alertmanager.yml
    networks:
      - supportsphere-network

volumes:
  postgres_data:

networks:
  supportsphere-network:
    driver: bridge
