apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: supportsphere
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: supportsphere-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_SERVER
              valueFrom:
                configMapKeyRef:
                  name: supportsphere-config
                  key: POSTGRES_SERVER
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: supportsphere-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: supportsphere-config
                  key: POSTGRES_DB
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: supportsphere-config
                  key: POSTGRES_PORT
            - name: API_V1_STR
              valueFrom:
                configMapKeyRef:
                  name: supportsphere-config
                  key: API_V1_STR
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: supportsphere-secrets
                  key: jwt-secret-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supportsphere-secrets
                  key: postgres-password
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: supportsphere
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
